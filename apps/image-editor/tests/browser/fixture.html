<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image editor browser tests</title>
    <link rel="stylesheet" href="/dist/tui-image-editor.css" />
    <style>
      html,
      body,
      #editor {
        width: 100vw;
        height: 100vh;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="editor"></div>
    <script src="/dist/tui-image-editor.js"></script>
    <script>
      const source = document.createElement('canvas');
      source.width = 80;
      source.height = 60;

      const context = source.getContext('2d');
      context.fillStyle = '#ff0000';
      context.fillRect(0, 0, 40, 30);
      context.fillStyle = '#00ff00';
      context.fillRect(40, 0, 40, 30);
      context.fillStyle = '#0000ff';
      context.fillRect(0, 30, 40, 30);
      context.fillStyle = '#ffff00';
      context.fillRect(40, 30, 40, 30);

      const sourceUrl = source.toDataURL('image/png');
      const useUI = new URLSearchParams(window.location.search).has('ui');
      const options = {
        cssMaxWidth: 640,
        cssMaxHeight: 480,
        usageStatistics: false,
      };

      if (useUI) {
        options.includeUI = {
          loadImage: { path: sourceUrl, name: 'quadrants' },
          menu: ['crop', 'flip', 'rotate', 'draw', 'shape', 'icon', 'text', 'filter'],
          uiSize: { width: '100%', height: '100%' },
          menuBarPosition: 'bottom',
        };
      }

      window.editor = new tui.ImageEditor('#editor', options);
      window.ready = useUI
        ? new Promise((resolve) => {
            const waitForImage = () => {
              if (window.editor.getImageName() === 'quadrants') {
                resolve();
              } else {
                requestAnimationFrame(waitForImage);
              }
            };
            waitForImage();
          })
        : window.editor.loadImageFromURL(sourceUrl, 'quadrants');

      window.getObjectControls = (id) => {
        const canvas = window.editor._graphics.getCanvas();
        const object = window.editor._graphics.getObject(id);
        const bounds = canvas.upperCanvasEl.getBoundingClientRect();
        const scaleX = bounds.width / canvas.getWidth();
        const scaleY = bounds.height / canvas.getHeight();
        object.setCoords();

        const point = ({ x, y }) => ({
          x: bounds.left + x * scaleX,
          y: bounds.top + y * scaleY,
        });

        return {
          center: point(object.getCenterPoint()),
          bottomRight: point(object.oCoords.br),
          middleRight: point(object.oCoords.mr),
          rotation: point(object.oCoords.mtr),
        };
      };
    </script>
  </body>
</html>
