name: browser tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  image-editor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --omit=optional
      - run: npx playwright install --with-deps chromium
      - run: npm test --workspace @parteekmalik/tui-image-editor -- --runInBand
      - run: npm run test:types --workspace @parteekmalik/tui-image-editor
      - run: npm run test:browser
